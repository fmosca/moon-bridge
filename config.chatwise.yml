# Moon Bridge configuration for Ollama Cloud models
# Used with Chatwise as OpenAI Chat Completions provider

mode: "Transform"

server:
  addr: "127.0.0.1:38440"

defaults:
  model: deepseek-flash
  max_tokens: 4096

models:
  deepseek-v4-flash:cloud:
    context_window: 131072
    max_output_tokens: 16384
    display_name: "DeepSeek V4 Flash (Cloud)"
  qwen3.5:cloud:
    context_window: 131072
    max_output_tokens: 16384
    display_name: "Qwen 3.5 (Cloud)"
  nemotron-3-super:cloud:
    context_window: 131072
    max_output_tokens: 16384
    display_name: "Nemotron-3 Super (Cloud)"

providers:
  ollama:
    base_url: "http://localhost:11434/v1"
    protocol: "openai-chat"
    api_key: "ollama"
    offers:
      - model: deepseek-v4-flash:cloud
      - model: qwen3.5:cloud
      - model: nemotron-3-super:cloud

routes:
  deepseek-flash:
    model: deepseek-v4-flash:cloud
    provider: ollama
  qwen35:
    model: qwen3.5:cloud
    provider: ollama
  nemotron-super:
    model: nemotron-3-super:cloud
    provider: ollama
